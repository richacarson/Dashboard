name: Deploy IOWN Dashboard to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Re-anchor rebalance constants"
      - "Build Portfolio History"
      - "Update Calendars"
      - "Execute Q2 2026 Rebalance"
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_ALPACA_KEY: ${{ secrets.ALPACA_API_KEY }}
          VITE_ALPACA_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          VITE_FMP_KEY: ${{ secrets.FMP_API }}
          VITE_FINNHUB_KEY: ${{ secrets.FINHUB_API }}
          VITE_ANTHROPIC_KEY: ${{ secrets.VITE_ANTHROPIC_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
