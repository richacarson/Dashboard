name: Build Portfolio History

on:
  workflow_dispatch:
    inputs:
      sleeve:
        description: 'Sleeve name (dividend, growth, digital)'
        required: true
        default: 'dividend'

permissions:
  contents: write

jobs:
  build-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build portfolio history
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: |
          python3 scripts/build-portfolio-history.py \
            "transactions/${{ inputs.sleeve }}_strategy_transactions.txt" \
            "${{ inputs.sleeve }}"
          
          # Move output to public folder
          mv "portfolio-history-${{ inputs.sleeve }}.json" "public/portfolio-history-${{ inputs.sleeve }}.json"
          
          echo "=== Output ==="
          ls -la public/portfolio-history-*.json
          head -c 500 "public/portfolio-history-${{ inputs.sleeve }}.json"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/portfolio-history-*.json
          git commit -m "Update portfolio history for ${{ inputs.sleeve }} sleeve" || echo "No changes"
          git push
