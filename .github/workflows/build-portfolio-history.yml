name: Build Portfolio History

on:
  workflow_dispatch:
    inputs:
      sleeve:
        description: 'Sleeve name (dividend, growth, digital)'
        required: true
        default: 'dividend'
  schedule:
    # Daily rebuild at 9:30 PM ET (01:30 UTC) — after market close
    - cron: '30 1 * * 1-5'
  push:
    branches: [main]
    paths:
      - 'transactions/user_transactions.json'
      - 'transactions/*_strategy_transactions.txt'
      - 'trigger.txt'

permissions:
  contents: write

jobs:
  build-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine sleeve(s)
        id: sleeve
        run: |
          if [ -n "${{ inputs.sleeve }}" ]; then
            echo "names=${{ inputs.sleeve }}" >> $GITHUB_OUTPUT
          else
            # Build all available sleeves on schedule/push
            SLEEVES=""
            for f in transactions/*_strategy_transactions.txt; do
              name=$(basename "$f" | sed 's/_strategy_transactions\.txt//')
              SLEEVES="${SLEEVES:+$SLEEVES,}$name"
            done
            echo "names=${SLEEVES:-dividend}" >> $GITHUB_OUTPUT
          fi

      - name: Build portfolio history
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          POLYGON_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          IFS=',' read -ra SLEEVES <<< "${{ steps.sleeve.outputs.names }}"
          for sleeve in "${SLEEVES[@]}"; do
            echo ""
            echo "=========================================="
            echo "Building sleeve: $sleeve"
            echo "=========================================="
            python3 scripts/build-portfolio-history.py \
              "transactions/${sleeve}_strategy_transactions.txt" \
              "$sleeve"

            # Move output to public folder
            mv "portfolio-history-${sleeve}.json" "public/portfolio-history-${sleeve}.json"
          done

          echo "=== All outputs ==="
          ls -la public/portfolio-history-*.json

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/portfolio-history-*.json
          git commit -m "Update portfolio history [${{ steps.sleeve.outputs.names }}]" || echo "No changes"
          git pull --rebase origin main
          git push
