name: Update Calendars

on:
  schedule:
    - cron: '0 5 * * 1-5'    # Midnight ET - refresh schedule
    - cron: '45 12 * * 1-5'  # 8:45 AM ET - catch 8:30 releases (CPI, PPI, NFP, GDP, claims)
    - cron: '15 13 * * 1-5'  # 9:15 AM ET - stragglers from 8:30/9:00
    - cron: '15 14 * * 1-5'  # 10:15 AM ET - catch 10:00 releases (ISM, consumer, home sales)
    - cron: '0 16 * * 1-5'   # 12:00 PM ET - midday catch-all
    - cron: '15 18 * * 1-5'  # 2:15 PM ET - FOMC decisions
    - cron: '0 19 * * 1-5'   # 3:00 PM ET - post-FOMC press conference
    - cron: '0 12 * * 0'     # Sunday noon - get next week's schedule
  workflow_dispatch:

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    env:
      FMP_KEY: ${{ secrets.FMP_API }}
      FINNHUB_KEY: ${{ secrets.FINHUB_API }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch calendar data
        run: |
          FROM=$(date -u +%Y-%m-%d -d "last monday")
          TO=$(date -u +%Y-%m-%d -d "next sunday + 7 days")

          echo "{}" > /tmp/finnhub_econ.json
          echo "[]" > /tmp/fmp_econ.json

          # Finnhub economic calendar (primary — includes actuals natively)
          if [ -n "$FINNHUB_KEY" ]; then
            HTTP_CODE=$(curl -sL -o /tmp/finnhub_econ.json -w "%{http_code}" \
              "https://finnhub.io/api/v1/calendar/economic?from=${FROM}&to=${TO}&token=${FINNHUB_KEY}" 2>/dev/null || echo "000")
            SIZE=$(wc -c < /tmp/finnhub_econ.json 2>/dev/null || echo "0")
            echo "Finnhub Economic Calendar: HTTP $HTTP_CODE, $SIZE bytes"
          fi

          # FMP economic calendar (secondary — also has actuals)
          if [ -n "$FMP_KEY" ]; then
            HTTP_CODE=$(curl -sL -o /tmp/fmp_econ.json -w "%{http_code}" \
              "https://financialmodelingprep.com/api/v3/economic_calendar?from=${FROM}&to=${TO}&apikey=${FMP_KEY}" 2>/dev/null || echo "000")
            SIZE=$(wc -c < /tmp/fmp_econ.json 2>/dev/null || echo "0")
            echo "FMP Economic Calendar: HTTP $HTTP_CODE, $SIZE bytes"
          fi

      - name: Process and write calendar
        run: |
          python3 << 'PY'
          import json

          events = []

          # PRIMARY: Finnhub economic calendar (includes actuals natively, no name matching needed)
          try:
              with open('/tmp/finnhub_econ.json') as f:
                  data = json.loads(f.read())
              raw = data.get('economicCalendar', data.get('result', []))
              if isinstance(raw, list):
                  for e in raw:
                      if e.get('country') == 'US' and (e.get('impact') or '').lower() in ('high', 'medium'):
                          events.append({
                              'title': e.get('event', ''),
                              'date': e.get('time') or e.get('date', ''),
                              'country': 'USD',
                              'impact': (e.get('impact') or '').capitalize(),
                              'actual': str(e['actual']) if e.get('actual') is not None else '',
                              'previous': str(e['prev']) if e.get('prev') is not None else '',
                              'forecast': str(e['estimate']) if e.get('estimate') is not None else '',
                              'unit': e.get('unit', ''),
                          })
                  print(f"Finnhub: {len(events)} US High/Medium events")
          except Exception as ex:
              print(f"Finnhub econ error: {ex}")

          # SECONDARY: FMP economic calendar (if Finnhub failed)
          if not events:
              try:
                  with open('/tmp/fmp_econ.json') as f:
                      fmp = json.loads(f.read())
                  if isinstance(fmp, list):
                      for e in fmp:
                          if e.get('country') == 'US' and (e.get('impact') or '').lower() in ('high', 'medium'):
                              events.append({
                                  'title': e.get('event', ''),
                                  'date': e.get('date', ''),
                                  'country': 'USD',
                                  'impact': (e.get('impact') or '').capitalize(),
                                  'actual': str(e['actual']) if e.get('actual') is not None else '',
                                  'previous': str(e['previous']) if e.get('previous') is not None else '',
                                  'forecast': str(e['estimate']) if e.get('estimate') is not None else '',
                              })
                      print(f"FMP fallback: {len(events)} events")
              except Exception as ex:
                  print(f"FMP fallback error: {ex}")

          events.sort(key=lambda e: e.get('date', ''))
          with_actuals = [e for e in events if e.get('actual') and str(e['actual']).strip()]
          print(f"Final: {len(events)} events ({len(with_actuals)} with actuals)")

          # Preserve actuals from existing file (in case source temporarily lost them)
          try:
              with open('public/economic-calendar.json') as ef:
                  existing = json.loads(ef.read())
              existing_map = {}
              for e in existing:
                  key = e.get('title', '') + '|' + (e.get('date', '')[:10])
                  if e.get('actual') and str(e['actual']).strip():
                      existing_map[key] = e['actual']
              merged = 0
              for e in events:
                  key = e.get('title', '') + '|' + (e.get('date', '')[:10])
                  if (not e.get('actual') or not str(e['actual']).strip()) and key in existing_map:
                      e['actual'] = existing_map[key]
                      merged += 1
              if merged:
                  print(f"Preserved {merged} actuals from existing file")
          except Exception as ex:
              print(f"Merge skipped: {ex}")

          with open('public/economic-calendar.json', 'w') as f:
              json.dump(events, f, indent=2)
          PY

      - name: Fetch earnings calendar
        run: |
          # Get this week and next week date ranges
          THIS_MON=$(date -u +%Y-%m-%d -d "last monday")
          THIS_FRI=$(date -u +%Y-%m-%d -d "last monday + 4 days")
          NEXT_MON=$(date -u +%Y-%m-%d -d "next monday")
          NEXT_FRI=$(date -u +%Y-%m-%d -d "next monday + 4 days")

          echo "[]" > /tmp/earnings_fmp.json
          echo "[]" > /tmp/earnings_finnhub.json

          # FMP earnings
          if [ -n "$FMP_KEY" ]; then
            HTTP_CODE=$(curl -sL -o /tmp/earnings_fmp_raw.json -w "%{http_code}" \
              "https://financialmodelingprep.com/api/v3/earning_calendar?from=${THIS_MON}&to=${NEXT_FRI}&apikey=${FMP_KEY}" 2>/dev/null || echo "000")
            SIZE=$(wc -c < /tmp/earnings_fmp_raw.json 2>/dev/null || echo "0")
            echo "FMP Earnings: HTTP $HTTP_CODE, $SIZE bytes"
            if [ "$HTTP_CODE" = "200" ] && [ "$SIZE" -gt 10 ]; then
              cp /tmp/earnings_fmp_raw.json /tmp/earnings_fmp.json
            fi
          fi

          # Finnhub earnings
          if [ -n "$FINNHUB_KEY" ]; then
            HTTP_CODE=$(curl -sL -o /tmp/earnings_finnhub_raw.json -w "%{http_code}" \
              "https://finnhub.io/api/v1/calendar/earnings?from=${THIS_MON}&to=${NEXT_FRI}&token=${FINNHUB_KEY}" 2>/dev/null || echo "000")
            SIZE=$(wc -c < /tmp/earnings_finnhub_raw.json 2>/dev/null || echo "0")
            echo "Finnhub Earnings: HTTP $HTTP_CODE, $SIZE bytes"
            if [ "$HTTP_CODE" = "200" ] && [ "$SIZE" -gt 10 ]; then
              cp /tmp/earnings_finnhub_raw.json /tmp/earnings_finnhub.json
            fi
          fi

      - name: Process earnings calendar
        run: |
          python3 << 'PY'
          import json

          earnings = {}  # key: symbol|date

          # Portfolio holdings — always include from Finnhub even when FMP has data
          PORTFOLIO = {
              "ABT","A","ADI","ATO","ADP","BKH","CAT","CHD","CL","FAST","GD","GPC","LRCX","LMT","MATX","NEE","ORI","PCAR","QCOM","DGX","SSNC","STLD","SYK","TEL","VLO",
              "AMD","AEM","ATAT","CVX","CWAN","CNX","COIN","EIX","FINV","FTNT","GFI","SUPV","HRMY","HUT","KEYS","MARA","NVDA","NXPI","OKE","PDD","HOOD","SYF","TSM","TOL",
              "IBIT","ETHA",
          }

          # FMP is primary (reliable dates)
          try:
              with open('/tmp/earnings_fmp.json') as f:
                  data = json.loads(f.read())
              if isinstance(data, list):
                  for e in data:
                      sym, dt = e.get('symbol'), e.get('date')
                      if not sym or not dt:
                          continue
                      key = f"{sym}|{dt}"
                      earnings[key] = {
                          'symbol': sym, 'date': dt,
                          'hour': 'bmo' if e.get('time') == 'bmo' else ('amc' if e.get('time') == 'amc' else (e.get('time') or '')),
                          'epsEstimate': e.get('epsEstimated'),
                          'epsActual': e.get('eps'),
                          'revenueEstimate': e.get('revenueEstimated'),
                          'revenueActual': e.get('revenue'),
                          'source': 'fmp',
                      }
                  print(f"FMP: {len(earnings)} earnings entries")
          except Exception as ex:
              print(f"FMP earnings error: {ex}")

          # Finnhub overlay
          fmp_count = len(earnings)
          try:
              with open('/tmp/earnings_finnhub.json') as f:
                  data = json.loads(f.read())
              raw = data.get('earningsCalendar', data.get('result', data.get('data', [])))
              if not isinstance(raw, list):
                  raw = raw.get('result', raw.get('data', []))
              added = 0
              for e in (raw if isinstance(raw, list) else []):
                  sym, dt = e.get('symbol'), e.get('date')
                  if not sym or not dt:
                      continue
                  key = f"{sym}|{dt}"
                  if key in earnings:
                      # Fill missing fields
                      ex = earnings[key]
                      if ex.get('epsActual') is None and e.get('epsActual') is not None:
                          ex['epsActual'] = e['epsActual']
                      if ex.get('epsEstimate') is None:
                          ex['epsEstimate'] = e.get('epsEstimate') or e.get('estimate')
                      if ex.get('revenueActual') is None and e.get('revenueActual') is not None:
                          ex['revenueActual'] = e['revenueActual']
                      if not ex.get('hour') and e.get('hour'):
                          ex['hour'] = e['hour']
                  elif fmp_count == 0 or sym in PORTFOLIO:
                      # Add Finnhub-only entries if no FMP OR if it's a portfolio holding
                      earnings[key] = {
                          'symbol': sym, 'date': dt, 'hour': e.get('hour', ''),
                          'epsEstimate': e.get('epsEstimate') or e.get('estimate'),
                          'epsActual': e.get('epsActual'),
                          'revenueEstimate': e.get('revenueEstimate'),
                          'revenueActual': e.get('revenueActual'),
                          'source': 'finnhub',
                      }
                      added += 1
              if added:
                  print(f"Finnhub: added {added} entries (no FMP)")
          except Exception as ex:
              print(f"Finnhub earnings error: {ex}")

          result = sorted(earnings.values(), key=lambda e: (e.get('date', ''), e.get('symbol', '')))
          print(f"Final: {len(result)} earnings entries")

          with open('public/earnings-calendar.json', 'w') as f:
              json.dump(result, f, indent=2)
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/economic-calendar.json public/earnings-calendar.json
          git diff --cached --quiet || (git commit -m "Auto-update calendars $(date -u +%Y-%m-%d\ %H:%M) UTC" && git push)
